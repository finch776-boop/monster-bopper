<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#1a1030" />
<title>⚡ Teen Titans GO! — Monster Bopper ⚡</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1030;
    font-family: 'Arial Black', 'Trebuchet MS', system-ui, sans-serif; user-select: none; -webkit-user-select: none; }
  canvas { display: block; touch-action: none; }

  /* ---------- HUD ---------- */
  #hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; color: #fff;
    text-shadow: 0 2px 6px rgba(0,0,0,.6), 0 0 2px rgba(0,0,0,.8); }
  #score { position: absolute; top: calc(14px + env(safe-area-inset-top)); left: calc(16px + env(safe-area-inset-left));
    font-size: 28px; font-weight: 900; color: #ffd23f; -webkit-text-stroke: 1.5px #1a1030; }
  #count { position: absolute; top: calc(50px + env(safe-area-inset-top)); left: calc(16px + env(safe-area-inset-left));
    font-size: 15px; opacity: .92; color: #7fd4ff; -webkit-text-stroke: .5px #1a1030; }
  #level { position: absolute; top: calc(14px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
    font-size: 22px; font-weight: 900; color: #ff7a00; -webkit-text-stroke: 1.5px #1a1030; }
  #power { position: absolute; top: calc(76px + env(safe-area-inset-top)); left: calc(16px + env(safe-area-inset-left));
    display: flex; align-items: center; gap: 7px; font-size: 16px; font-weight: 900; -webkit-text-stroke: .5px #1a1030; }
  #power .pbar { width: 90px; height: 9px; border-radius: 5px; background: rgba(255,255,255,.25); overflow: hidden; }
  #power .pfill { height: 100%; width: 100%; background: #ffd23f; border-radius: 5px; }
  #bossbar { position: absolute; top: calc(46px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
    width: min(420px, 78vw); text-align: center; }
  #bossname { font-size: 18px; font-weight: 900; color: #ff4d4d; -webkit-text-stroke: 1px #1a1030; margin-bottom: 3px; letter-spacing: 1px; }
  #bosshpwrap { height: 16px; background: rgba(0,0,0,.45); border: 2px solid #fff; border-radius: 10px; overflow: hidden; }
  #bosshp { height: 100%; width: 100%; background: linear-gradient(90deg, #ff7a00, #ff2e2e); transition: width .12s; }
  #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 30px; height: 30px; }
  #crosshair::before, #crosshair::after { content: ''; position: absolute; background: var(--reticle, #29d3ff); box-shadow: 0 0 6px var(--reticle, #29d3ff), 0 0 2px #000; }
  #crosshair::before { left: 50%; top: 0; width: 3px; height: 100%; transform: translateX(-50%); border-radius: 3px; }
  #crosshair::after  { top: 50%; left: 0; height: 3px; width: 100%; transform: translateY(-50%); border-radius: 3px; }
  #crosshair .dot { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; transform: translate(-50%,-50%);
    background: #fff; border: 2px solid var(--reticle, #29d3ff); border-radius: 50%; box-shadow: 0 0 8px var(--reticle, #29d3ff); }
  #hint { position: absolute; bottom: calc(14px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
    font-size: 14px; font-weight: bold; background: rgba(26,16,48,.5); padding: 6px 14px; border-radius: 20px;
    border: 2px solid rgba(127,212,255,.45); max-width: 80vw; text-align: center; }
  .popup { position: absolute; font-size: 30px; font-weight: 900; color: #ffd23f; -webkit-text-stroke: 2px #1a1030;
    text-shadow: 0 3px 8px rgba(0,0,0,.6); animation: floatUp .9s ease-out forwards; white-space: nowrap; }
  @keyframes floatUp { from { opacity: 1; transform: translate(-50%,-50%) scale(.5) rotate(-6deg); }
    to { opacity: 0; transform: translate(-50%,-160%) scale(1.25) rotate(4deg); } }
  #banner { position: absolute; top: 30%; left: 50%; transform: translate(-50%,-50%); font-size: 44px; font-weight: 900;
    color: #fff; -webkit-text-stroke: 3px #7b2fd0; text-shadow: 0 4px 0 #4a1a85; text-align: center; opacity: 0; white-space: nowrap; }
  #banner.show { animation: bannerPop 1.8s ease-out forwards; }
  @keyframes bannerPop { 0% { opacity: 0; transform: translate(-50%,-50%) scale(.4); }
    20% { opacity: 1; transform: translate(-50%,-50%) scale(1.1); } 80% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%,-90%) scale(1); } }

  /* ---------- Touch controls ---------- */
  #touch { position: fixed; inset: 0; z-index: 8; touch-action: none; display: none; }
  body.touch #touch { display: block; }
  #stick { position: fixed; width: 120px; height: 120px; border-radius: 50%; border: 3px solid rgba(255,255,255,.4);
    background: rgba(255,255,255,.08); transform: translate(-50%,-50%); display: none; z-index: 9; pointer-events: none; }
  #thumb { position: fixed; width: 56px; height: 56px; border-radius: 50%; background: rgba(127,212,255,.55);
    border: 3px solid #fff; transform: translate(-50%,-50%); display: none; z-index: 9; pointer-events: none; }
  .touchbtn { position: fixed; z-index: 11; border-radius: 50%; display: none; align-items: center; justify-content: center;
    font-weight: 900; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,.5); touch-action: none; }
  body.touch .touchbtn { display: flex; }
  #btnFire { right: calc(26px + env(safe-area-inset-right)); bottom: calc(30px + env(safe-area-inset-bottom));
    width: 108px; height: 108px; background: radial-gradient(circle at 40% 35%, #ff7b7b, #d42a2a); border: 5px solid #fff;
    font-size: 19px; box-shadow: 0 6px 0 #951c1c; }
  #btnFire:active { transform: translateY(3px); box-shadow: 0 3px 0 #951c1c; }
  #btnJump { right: calc(146px + env(safe-area-inset-right)); bottom: calc(46px + env(safe-area-inset-bottom));
    width: 82px; height: 82px; background: radial-gradient(circle at 40% 35%, #5bc0ff, #1a86c8); border: 4px solid #fff;
    font-size: 17px; box-shadow: 0 5px 0 #115a86; }
  #btnJump:active { transform: translateY(3px); box-shadow: 0 2px 0 #115a86; }
  #btnPause { right: calc(14px + env(safe-area-inset-right)); top: calc(14px + env(safe-area-inset-top));
    width: 46px; height: 46px; background: rgba(26,16,48,.55); border: 2px solid rgba(255,255,255,.5); font-size: 18px; }

  /* ---------- Overlay ---------- */
  #overlay { position: fixed; inset: 0; z-index: 20; display: flex; overflow: hidden; cursor: pointer;
    flex-direction: column; align-items: center; justify-content: center; text-align: center;
    background: radial-gradient(circle at 50% 22%, rgba(120,90,210,.55), rgba(20,12,42,0) 55%),
      linear-gradient(180deg, #2a1a55 0%, #1a1030 55%, #0d0820 100%); color: #fff; padding: 12px; }
  #overlay .burst { position: absolute; top: 24%; left: 50%; width: 900px; height: 900px; transform: translate(-50%,-50%);
    pointer-events: none; opacity: .3; background: repeating-conic-gradient(from 0deg, #ffd23f 0deg 8deg, transparent 8deg 16deg);
    -webkit-mask: radial-gradient(circle, #000 0 38%, transparent 60%); mask: radial-gradient(circle, #000 0 38%, transparent 60%);
    animation: spin 28s linear infinite; }
  @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }
  .tt { font-size: clamp(34px, 8vw, 56px); font-weight: 900; color: #fff; -webkit-text-stroke: 3px #7b2fd0;
    text-shadow: 0 5px 0 #4a1a85, 0 8px 16px rgba(0,0,0,.5); transform: skewY(-3deg); z-index: 1; }
  .sub { font-size: clamp(20px, 5vw, 30px); font-weight: 900; margin-top: 2px; color: #ff7a00;
    -webkit-text-stroke: 2px #1a1030; text-shadow: 0 3px 0 #a04e00; z-index: 1; }
  .choose { z-index: 1; margin: 16px 0 8px; font-size: 19px; font-weight: 900; color: #7fd4ff; letter-spacing: 1px; }
  #titanGrid { z-index: 1; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; max-width: 640px; }
  .titan { background: rgba(255,255,255,.08); border: 3px solid rgba(255,255,255,.25); border-radius: 16px;
    padding: 12px 10px 10px; width: 116px; cursor: pointer; transition: transform .12s, border-color .12s, background .12s; color: #fff; }
  .titan:hover { transform: translateY(-3px); }
  .titan.sel { border-color: #ffd23f; background: rgba(255,210,63,.18); transform: translateY(-4px) scale(1.04); }
  .titan .orb { width: 52px; height: 52px; border-radius: 50%; margin: 0 auto 8px; border: 3px solid rgba(255,255,255,.85);
    box-shadow: 0 3px 10px rgba(0,0,0,.4); }
  .titan .nm { font-size: 17px; font-weight: 900; }
  .titan .pk { font-size: 11px; opacity: .85; margin-top: 3px; line-height: 1.2; }
  #go { z-index: 1; margin-top: 18px; background: linear-gradient(180deg, #ff4d4d, #d42a2a); color: #fff; font-weight: 900;
    font-size: 26px; padding: 15px 50px; border: 4px solid #fff; border-radius: 40px; letter-spacing: 1px; cursor: pointer;
    box-shadow: 0 8px 0 #951c1c, 0 12px 20px rgba(0,0,0,.4); animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  #pauseScreen .tt { font-size: 44px; }
  .ctlhint { z-index: 1; margin-top: 14px; font-size: 14px; color: #cdbcff; line-height: 1.5; }
  .hidden { display: none !important; }
  #loading { position: fixed; inset: 0; z-index: 30; display: flex; align-items: center; justify-content: center;
    background: #1a1030; color: #7fd4ff; font-size: 22px; font-weight: 900; }
  /* narrow / portrait phones: keep the top HUD from colliding & free the buttons */
  @media (max-width: 560px) {
    #score { font-size: 21px; }
    #count { font-size: 13px; top: calc(46px + env(safe-area-inset-top)); }
    #level { left: auto; right: calc(70px + env(safe-area-inset-right)); transform: none; font-size: 18px; }
    #power { top: calc(72px + env(safe-area-inset-top)); font-size: 13px; }
    #power .pbar { width: 70px; }
    #bossbar { top: calc(70px + env(safe-area-inset-top)); }
    #hint { display: none; }
    #banner { font-size: 30px; -webkit-text-stroke: 2px #7b2fd0; }
  }
</style>
</head>
<body>
  <div id="loading">Booting up Jump City… ⚡</div>

  <div id="hud" class="hidden">
    <div id="score">💥 Zapped: 0</div>
    <div id="count">👾 Monsters: 0</div>
    <div id="level">LV 1</div>
    <div id="power" class="hidden"><span id="powicon">⚡</span><span id="powname">RAPID</span><span class="pbar"><span class="pfill" id="powfill"></span></span></div>
    <div id="bossbar" class="hidden"><div id="bossname">BOSS</div><div id="bosshpwrap"><div id="bosshp"></div></div></div>
    <div id="crosshair"><span class="dot"></span></div>
    <div id="banner"></div>
    <div id="hint">Blast the spiky monsters — BOOYAH! ⚡</div>
  </div>

  <div id="touch">
    <div id="stick"></div><div id="thumb"></div>
  </div>
  <div id="btnJump" class="touchbtn">JUMP</div>
  <div id="btnFire" class="touchbtn">FIRE</div>
  <div id="btnPause" class="touchbtn">⏸</div>

  <div id="overlay">
    <div class="burst"></div>
    <div id="selectScreen">
      <div class="tt">TEEN TITANS GO!</div>
      <div class="sub">MONSTER BOPPER</div>
      <div class="choose">⬇ CHOOSE YOUR TITAN ⬇</div>
      <div id="titanGrid"></div>
      <div id="go">▶ TITANS GO!</div>
      <div class="ctlhint" id="ctlhint"></div>
    </div>
    <div id="pauseScreen" class="hidden">
      <div class="tt">⏸️ PAUSED</div>
      <div class="sub">MONSTER BOPPER</div>
      <div id="resume" style="margin-top:22px;background:linear-gradient(180deg,#5bc0ff,#1a86c8);color:#fff;font-weight:900;font-size:24px;padding:14px 44px;border:4px solid #fff;border-radius:40px;box-shadow:0 7px 0 #115a86;cursor:pointer;">▶ Keep Playing</div>
    </div>
  </div>

<script type="module">
import * as THREE from './three.module.js';

/* =====================================================================
   TEEN TITANS GO! — MONSTER BOPPER  (mobile + desktop)
   Pick a Titan, blast spiky one-eyed monsters in Jump City. Touch
   controls on phones/tablets, escalating difficulty, bosses & power-ups.
   ===================================================================== */

// ---------- device / quality ----------
const forceTouch = new URLSearchParams(location.search).has('touch');
const isTouch = forceTouch || (matchMedia('(pointer: coarse)').matches && navigator.maxTouchPoints > 0);
const Q = isTouch
  ? { shadows: false, pr: Math.min(devicePixelRatio, 1.5), aa: false, trees: 14, rocks: 8, bushes: 10, flowers: 18, city: 22, clouds: 8, base: 6, max: 16, spikes: 7, parts: 12, fog: [55, 160] }
  : { shadows: true,  pr: Math.min(devicePixelRatio, 2),  aa: true,  trees: 28, rocks: 16, bushes: 22, flowers: 50, city: 40, clouds: 12, base: 10, max: 26, spikes: 13, parts: 20, fog: [70, 240] };
if (isTouch) document.body.classList.add('touch');

// ---------- core ----------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x8fbfe8);
scene.fog = new THREE.Fog(0x8fbfe8, Q.fog[0], Q.fog[1]);
const camera = new THREE.PerspectiveCamera(74, innerWidth / innerHeight, 0.1, 600);
camera.rotation.order = 'YXZ';
camera.position.set(0, 1.7, 22);
scene.add(camera);
const renderer = new THREE.WebGLRenderer({ antialias: Q.aa });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Q.pr);
renderer.shadowMap.enabled = Q.shadows;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ---------- lighting ----------
scene.add(new THREE.HemisphereLight(0xcfe7ff, 0x6b8f4a, 0.95));
const sun = new THREE.DirectionalLight(0xfff4d6, 1.25);
sun.position.set(40, 75, 25);
if (Q.shadows) {
  sun.castShadow = true; sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.near = 1; sun.shadow.camera.far = 240;
  const S = 120; sun.shadow.camera.left = -S; sun.shadow.camera.right = S; sun.shadow.camera.top = S; sun.shadow.camera.bottom = -S;
  sun.shadow.bias = -0.0004;
}
scene.add(sun);

// ---------- helpers ----------
const WORLD = 100;
const up3 = new THREE.Vector3(0, 1, 0);
const rand = (a, b) => a + Math.random() * (b - a);
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
function place(o, e = 6) { o.position.x = rand(-WORLD + e, WORLD - e); o.position.z = rand(-WORLD + e, WORLD - e); return o; }
function castS(m) { if (Q.shadows) m.castShadow = true; return m; }

// ---------- world ----------
const ground = new THREE.Mesh(new THREE.PlaneGeometry(WORLD * 2.4, WORLD * 2.4), new THREE.MeshStandardMaterial({ color: 0x7ec84f, roughness: 1 }));
ground.rotation.x = -Math.PI / 2; ground.receiveShadow = Q.shadows; scene.add(ground);

const hillMat = new THREE.MeshStandardMaterial({ color: 0x86ce57, roughness: 1 });
for (let i = 0; i < 12; i++) { const r = rand(7, 16); const h = new THREE.Mesh(new THREE.SphereGeometry(r, 14, 10), hillMat);
  place(h, r); h.position.y = rand(-r * 0.85, -r * 0.6); h.scale.y = rand(0.25, 0.45); h.receiveShadow = Q.shadows; scene.add(h); }

const trunkMat = new THREE.MeshStandardMaterial({ color: 0x9c6b3f, roughness: 1 });
const leafMats = [0x4caf50, 0x66bb6a, 0x43a047, 0x7cb342].map(c => new THREE.MeshStandardMaterial({ color: c, roughness: 1 }));
function makeTree() { const g = new THREE.Group(); const h = rand(3, 5);
  const t = castS(new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.5, h, 8), trunkMat)); t.position.y = h / 2; g.add(t);
  const m = leafMats[(Math.random() * leafMats.length) | 0];
  for (let i = 0; i < 3; i++) { const b = castS(new THREE.Mesh(new THREE.SphereGeometry(rand(1.6, 2.3), 9, 7), m));
    b.position.set(rand(-0.7, 0.7), h + rand(-0.2, 1.4), rand(-0.7, 0.7)); g.add(b); } return g; }
for (let i = 0; i < Q.trees; i++) scene.add(place(makeTree()));

const rockMat = new THREE.MeshStandardMaterial({ color: 0x9aa0a6, roughness: 1, flatShading: true });
for (let i = 0; i < Q.rocks; i++) { const r = castS(new THREE.Mesh(new THREE.DodecahedronGeometry(rand(0.7, 1.8)), rockMat));
  place(r); r.position.y = rand(0.1, 0.5); r.rotation.set(rand(0, 6), rand(0, 6), rand(0, 6)); r.receiveShadow = Q.shadows; scene.add(r); }

const bushMat = new THREE.MeshStandardMaterial({ color: 0x3f9d4a, roughness: 1 });
for (let i = 0; i < Q.bushes; i++) { const b = castS(new THREE.Mesh(new THREE.SphereGeometry(rand(0.7, 1.3), 8, 6), bushMat));
  place(b); b.position.y = rand(0.3, 0.6); b.scale.y = 0.75; scene.add(b); }

const flowerColors = [0xff5d8f, 0xffd83d, 0xff8a3d, 0xb56bff, 0xff5d5d, 0xffffff];
for (let i = 0; i < Q.flowers; i++) { const g = new THREE.Group();
  const s = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.6, 5), new THREE.MeshStandardMaterial({ color: 0x3f9d4a })); s.position.y = 0.3; g.add(s);
  const p = new THREE.Mesh(new THREE.SphereGeometry(0.18, 7, 6), new THREE.MeshStandardMaterial({ color: flowerColors[(Math.random() * flowerColors.length) | 0], emissive: 0x222200, roughness: .7 }));
  p.position.y = 0.62; p.scale.y = 0.6; g.add(p); place(g, 2); scene.add(g); }

const clouds = [];
const cloudMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1, emissive: 0x556677, emissiveIntensity: .15 });
for (let i = 0; i < Q.clouds; i++) { const c = new THREE.Group();
  for (let j = 0; j < 4; j++) { const pf = new THREE.Mesh(new THREE.SphereGeometry(rand(2.5, 4.5), 7, 6), cloudMat); pf.position.set(rand(-4, 4), rand(-.6, .6), rand(-3, 3)); c.add(pf); }
  c.position.set(rand(-WORLD, WORLD), rand(36, 52), rand(-WORLD, WORLD)); c.userData.drift = rand(0.6, 1.6); clouds.push(c); scene.add(c); }

const fenceMat = new THREE.MeshStandardMaterial({ color: 0xc98a4b, roughness: 1 });
function wall(len, hor, off) { const w = castS(new THREE.Mesh(new THREE.BoxGeometry(hor ? len : 1, 2.4, hor ? 1 : len), fenceMat));
  w.position.set(hor ? 0 : off, 1.2, hor ? off : 0); w.receiveShadow = Q.shadows; scene.add(w); }
wall(WORLD * 2, true, WORLD); wall(WORLD * 2, true, -WORLD); wall(WORLD * 2, false, WORLD); wall(WORLD * 2, false, -WORLD);

// Titans Tower
(function tower(x, z) { const t = new THREE.Group();
  const isl = castS(new THREE.Mesh(new THREE.CylinderGeometry(13, 17, 3, 22), new THREE.MeshStandardMaterial({ color: 0x7d8a97, roughness: 1, flatShading: true }))); isl.position.y = 1; isl.receiveShadow = Q.shadows; t.add(isl);
  const cap = new THREE.Mesh(new THREE.CylinderGeometry(13, 13, 0.5, 22), new THREE.MeshStandardMaterial({ color: 0x6fbf4a, roughness: 1 })); cap.position.y = 2.6; t.add(cap);
  const tm = new THREE.MeshStandardMaterial({ color: 0xbcd6ea, roughness: .45, metalness: .15 }); const base = 2.85;
  const stem = castS(new THREE.Mesh(new THREE.BoxGeometry(6, 22, 6), tm)); stem.position.y = base + 11; t.add(stem);
  const bar = castS(new THREE.Mesh(new THREE.BoxGeometry(18, 6.5, 6), tm)); bar.position.y = base + 22.5; t.add(bar);
  const wm = new THREE.MeshStandardMaterial({ color: 0x9fe8ff, emissive: 0x6fd0ff, emissiveIntensity: .55 });
  for (let yy = 0; yy < 6; yy++) for (let xx = -1; xx <= 1; xx++) { const w = new THREE.Mesh(new THREE.BoxGeometry(1.1, 1.7, 0.3), wm); w.position.set(xx * 1.8, base + 4 + yy * 3, 3.05); t.add(w); }
  const Tm = new THREE.MeshStandardMaterial({ color: 0x1565c0, emissive: 0x0d47a1, emissiveIntensity: .35 });
  const tt = new THREE.Mesh(new THREE.BoxGeometry(12, 2, 0.4), Tm); tt.position.set(0, base + 24, 3.15); t.add(tt);
  const ts = new THREE.Mesh(new THREE.BoxGeometry(2.6, 9, 0.4), Tm); ts.position.set(0, base + 19.5, 3.15); t.add(ts);
  t.position.set(x, 0, z); scene.add(t);
})(0, -84);

// Jump City skyline
(function city() { const c = document.createElement('canvas'); c.width = 64; c.height = 128; const x = c.getContext('2d');
  x.fillStyle = '#243447'; x.fillRect(0, 0, 64, 128);
  for (let yy = 6; yy < 128; yy += 12) for (let xx = 6; xx < 64; xx += 12) { x.fillStyle = Math.random() < .55 ? '#ffe27a' : '#33485e'; x.fillRect(xx, yy, 7, 8); }
  const base = new THREE.CanvasTexture(c); base.wrapS = base.wrapT = THREE.RepeatWrapping;
  const tints = [0x3b4a66, 0x4a3b66, 0x33506b, 0x5b3b5e, 0x3b5b57];
  for (let i = 0; i < Q.city; i++) { const a = (i / Q.city) * Math.PI * 2 + rand(-.05, .05); const r = rand(118, 165);
    const w = rand(8, 16), h = rand(22, 70), d = rand(8, 16); const tex = base.clone(); tex.needsUpdate = true; tex.repeat.set(Math.max(1, w / 5), Math.max(1, h / 6));
    const b = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({ color: tints[i % tints.length], roughness: .9, map: tex, emissive: 0xffffff, emissiveMap: tex, emissiveIntensity: .35 }));
    b.position.set(Math.cos(a) * r, h / 2, Math.sin(a) * r); scene.add(b); }
})();

// ---------- Titans (characters) ----------
const TITANS = [
  { key: 'cyborg',   name: 'Cyborg',    css: '#5b8db8', proj: 0x29d3ff, weapon: 0x8a949e, accent: 0x29d3ff, cd: 0.20, perk: 'Sonic cannon' },

const MONSTER_COLORS = [0xff6a00, 0xff6a00, 0xff7f1a, 0xe85d04, 0x7ac74f, 0x9b3fd4, 0xd42a2a, 0x16a59c, 0xff2e88];

function addHat(g, size) {
  const r = Math.random();
  if (r < 0.45) { // party cone
    const h = new THREE.Mesh(new THREE.ConeGeometry(size * 0.4, size * 0.7, 12),
      new THREE.MeshStandardMaterial({ color: [0xff5d8f, 0x29d3ff, 0xffd23f, 0x9be35a][(Math.random() * 4) | 0], roughness: .5 }));
    h.position.set(0, size * 1.35, 0); g.add(h);
    const pom = new THREE.Mesh(new THREE.SphereGeometry(size * 0.12, 8, 6), new THREE.MeshStandardMaterial({ color: 0xffffff })); pom.position.set(0, size * 1.72, 0); g.add(pom);
  } else if (r < 0.75) { // top hat
    const brim = new THREE.Mesh(new THREE.CylinderGeometry(size * 0.5, size * 0.5, size * 0.08, 14), new THREE.MeshStandardMaterial({ color: 0x222222 })); brim.position.set(0, size * 1.18, 0); g.add(brim);
    const top = new THREE.Mesh(new THREE.CylinderGeometry(size * 0.32, size * 0.32, size * 0.5, 14), new THREE.MeshStandardMaterial({ color: 0x222222 })); top.position.set(0, size * 1.45, 0); g.add(top);
  } else { // propeller
    const stalk = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, size * 0.35, 6), new THREE.MeshStandardMaterial({ color: 0x333 })); stalk.position.set(0, size * 1.3, 0); g.add(stalk);
    for (let i = 0; i < 3; i++) { const bl = new THREE.Mesh(new THREE.BoxGeometry(size * 0.5, 0.05, size * 0.14), new THREE.MeshStandardMaterial({ color: [0xff5d5d, 0x5dff8f, 0x5d8fff][i], roughness: .5 }));
      bl.position.set(0, size * 1.48, 0); bl.rotation.y = i * 2.1; g.add(bl); }
  }
}

function makeMonster(opts = {}) {
  const boss = !!opts.boss, mini = !!opts.mini, golden = !!opts.golden;
  const size = boss ? 3.2 : (mini ? 0.6 : (opts.size || rand(0.85, 1.6)));
  const color = golden ? 0xffd23f : (boss ? 0x6a1f8a : MONSTER_COLORS[(Math.random() * MONSTER_COLORS.length) | 0]);
  const darker = new THREE.Color(color).multiplyScalar(0.5).getHex();
  const g = new THREE.Group();

  const bodyMat = golden
    ? new THREE.MeshStandardMaterial({ color, roughness: .25, metalness: .6, emissive: 0x553300, emissiveIntensity: .3 })
    : new THREE.MeshStandardMaterial({ color, roughness: .6, flatShading: true, emissive: color, emissiveIntensity: boss ? .15 : .08 });
  const body = castS(new THREE.Mesh(new THREE.IcosahedronGeometry(size, 1), bodyMat)); g.add(body);

  const spikeMat = new THREE.MeshStandardMaterial({ color: darker, roughness: .7, flatShading: true });
  const sc = Math.min(Q.spikes, boss ? 18 : (9 + (Math.random() * 6 | 0)));
  for (let i = 0; i < sc; i++) {
    const d = new THREE.Vector3(rand(-1, 1), rand(-1, 1), rand(-1, 1)); if (d.lengthSq() < .02) d.set(0, 1, 0); d.normalize();
    if (d.z > .45) d.z = -d.z; if (d.y < -.35) d.y = -.35; d.normalize();
    const sp = new THREE.Mesh(new THREE.ConeGeometry(size * (boss ? .2 : .17), size * rand(boss ? .7 : .45, boss ? 1.1 : .85), 6), spikeMat);
    sp.position.copy(d).multiplyScalar(size * 0.9); sp.quaternion.setFromUnitVectors(up3, d); g.add(sp);
  }

  // big cyclops eye
  const ew = new THREE.Mesh(new THREE.SphereGeometry(size * 0.46, 14, 12), new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: .25 }));
  ew.position.set(0, size * 0.08, size * 0.72); ew.scale.z = 0.8; g.add(ew);
  const ic = boss ? 0xff2020 : IRIS_COLORS[(Math.random() * IRIS_COLORS.length) | 0];
  const iris = new THREE.Mesh(new THREE.SphereGeometry(size * 0.24, 12, 10), new THREE.MeshStandardMaterial({ color: ic, emissive: ic, emissiveIntensity: .5, roughness: .4 }));
  iris.position.set(0, size * 0.08, size * 1.0); g.add(iris);
  const pup = new THREE.Mesh(new THREE.SphereGeometry(size * 0.12, 10, 8), new THREE.MeshStandardMaterial({ color: 0 })); pup.position.set(0, size * 0.08, size * 1.15); g.add(pup);
  if (boss) for (const sx of [-1, 1]) { // extra menace eyes
    const e2 = new THREE.Mesh(new THREE.SphereGeometry(size * 0.16, 10, 8), new THREE.MeshStandardMaterial({ color: 0xffffff })); e2.position.set(sx * size * 0.5, size * 0.42, size * 0.66); g.add(e2);
    const p2 = new THREE.Mesh(new THREE.SphereGeometry(size * 0.07, 8, 6), new THREE.MeshStandardMaterial({ color: 0 })); p2.position.set(sx * size * 0.5, size * 0.42, size * 0.8); g.add(p2);
  }
  // angry brows
  const bm = new THREE.MeshStandardMaterial({ color: darker, roughness: .85 });
  for (const sx of [-1, 1]) { const b = new THREE.Mesh(new THREE.BoxGeometry(size * 0.5, size * 0.13, size * 0.13), bm); b.position.set(sx * size * 0.2, size * 0.55, size * 0.78); b.rotation.z = sx * -0.55; g.add(b); }
  // fanged grin
  const mouth = new THREE.Mesh(new THREE.BoxGeometry(size * 0.62, size * 0.22, size * 0.12), new THREE.MeshStandardMaterial({ color: 0x240808, roughness: .9 })); mouth.position.set(0, -size * 0.45, size * 0.78); g.add(mouth);
  const fm = new THREE.MeshStandardMaterial({ color: 0xfff7e6, roughness: .4 }); const fn = 3 + (Math.random() * 3 | 0);
  for (let i = 0; i < fn; i++) { const fx = (fn === 1 ? 0 : (i / (fn - 1) - 0.5)) * size * 0.46; const f = new THREE.Mesh(new THREE.ConeGeometry(size * 0.06, size * 0.2, 6), fm); f.position.set(fx, -size * 0.4, size * 0.84); f.rotation.x = Math.PI; g.add(f); }

  if (!boss && !mini && !golden && Math.random() < 0.35) addHat(g, size);

  g.userData = {
    size, color, iris, isBoss: boss, golden,
    splitter: opts.splitter || false,
    hp: boss ? opts.hp : 1, maxhp: boss ? opts.hp : 1,
    score: boss ? 10 : (golden ? 5 : 1),
    speed: (boss ? 2.0 : (golden ? rand(4.5, 5.5) : rand(2.2, 4.4))) * (mini ? 1.5 : 1),
    bob: rand(0, 6.28), wander: rand(0, 6.28), hitFlash: 0, grow: 0,
  };
  if (opts.pos) g.position.copy(opts.pos).setY(size);
  else do { g.position.set(rand(-WORLD + 5, WORLD - 5), size, rand(-WORLD + 5, WORLD - 5)); } while (g.position.distanceTo(camera.position) < (boss ? 26 : 16));
  g.scale.setScalar(0.01); monsters.push(g); scene.add(g);
  return g;
}

// ---------- projectiles ----------
const balls = [];
function spawnBall(dir, speed, color, radius, pierce, bounce, meat) {
  const b = castS(new THREE.Mesh(new THREE.SphereGeometry(radius, 12, 10), new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: meat ? .25 : 1.0, roughness: meat ? .8 : .3 })));
  b.position.copy(camera.position).addScaledVector(dir, 1.0);
  b.userData = { vel: dir.clone().multiplyScalar(speed), life: bounce ? 3.4 : 2.2, radius, pierce, bounce, meat, hit: new Set() };
  balls.push(b); scene.add(b);
}
function shoot() {
  const p = power.type;
  const meat = p === 'meatball';
  const triple = titan.triple || p === 'triple' || p === 'star';
  const bounce = titan.bounce || p === 'bouncy';
  const big = titan.big || p === 'star';
  const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
  const speed = meat ? 42 : 56;
  const color = meat ? 0x9a5a2b : (p === 'star' ? 0xffd23f : titan.proj);
  const radius = meat ? 0.62 : (big ? 0.42 : 0.26);
  const pierce = meat ? 4 : (p === 'star' ? 1 : 0);
  const angles = triple ? [-0.13, 0, 0.13] : [0];
  for (const a of angles) spawnBall(dir.clone().applyAxisAngle(up3, a), speed, color, radius, pierce, bounce, meat);
  muzzle.visible = true; muzzle.scale.setScalar(meat ? 1.5 : 1);
  gun.position.z = GUN_HOME.z + (meat ? 0.26 : 0.18);
  beep(meat ? 'splat' : 'zap');
}

// ---------- particles ----------
const particles = [];
function poof(pos, color, n = Q.parts) {
  for (let i = 0; i < n; i++) { const k = i % 3; const col = k === 1 ? 0x29d3ff : (k === 2 ? 0xffd23f : color);
    const p = new THREE.Mesh(k === 2 ? new THREE.OctahedronGeometry(rand(.13, .26)) : new THREE.SphereGeometry(rand(.1, .24), 7, 6),
      new THREE.MeshStandardMaterial({ color: col, emissive: col, emissiveIntensity: .6 }));
    p.position.copy(pos); p.userData = { vel: new THREE.Vector3(rand(-1, 1), rand(.3, 1.3), rand(-1, 1)).normalize().multiplyScalar(rand(6, 13)), life: rand(.6, 1), spin: rand(-12, 12) };
    particles.push(p); scene.add(p); }
}

// ---------- damage / pop / boss ----------
const BOSS_NAMES = ['MEGA CYCLOPS', 'SIR SPIKES-A-LOT', 'GLARG THE GIANT', 'STOMPZILLA', 'THE BLOB KING', 'ONE-EYED OZ'];
function damage(m, dmg, fromPos) {
  const u = m.userData; u.hp -= dmg; u.hitFlash = 0.18;
  if (u.hp <= 0) { popMonster(m); return; }
  poof(m.position.clone().setY(m.position.y + u.size * 0.3), u.color, 6);
  const kb = new THREE.Vector3().subVectors(m.position, fromPos).setY(0).normalize().multiplyScalar(0.6); m.position.add(kb);
  if (u.isBoss) bossHpEl.style.width = (u.hp / u.maxhp * 100) + '%';
  beep('hit');
}
function popMonster(m) {
  const u = m.userData;
  if (u.isBoss) { defeatBoss(m); return; }
  poof(m.position.clone().setY(m.position.y + u.size * 0.3), u.color);
  scene.remove(m); const i = monsters.indexOf(m); if (i >= 0) monsters.splice(i, 1);
  score += u.score; updateScore(); beep('boom'); showPopup(POPUPS[(Math.random() * POPUPS.length) | 0]);
  if (u.golden) { banner('✨ GOLDEN! BONUS! ✨'); spawnPickup(null, m.position); }
  if (u.splitter) for (let k = 0; k < 2; k++) makeMonster({ mini: true, pos: m.position.clone().add(new THREE.Vector3(rand(-1.5, 1.5), 0, rand(-1.5, 1.5))) });
  checkBoss();
}
function checkBoss() { if (!bossActive && score >= nextBoss) triggerBoss(); }
function triggerBoss() {
  bossActive = true; const hp = 6 + level * 3;
  bossRef = makeMonster({ boss: true, hp });
  bossNameEl.textContent = BOSS_NAMES[(Math.random() * BOSS_NAMES.length) | 0]; bossHpEl.style.width = '100%'; bossEl.classList.remove('hidden');
  banner('⚠️ BOSS INCOMING! ⚠️'); beep('bossSpawn');
}
function defeatBoss(m) {
  poof(m.position.clone().setY(m.position.y + 1), m.userData.color, 50);
  poof(m.position.clone().setY(m.position.y + 2), 0xffd23f, 30);
  scene.remove(m); const i = monsters.indexOf(m); if (i >= 0) monsters.splice(i, 1);
  bossActive = false; bossRef = null; bossEl.classList.add('hidden');
  score += 10; updateScore(); beep('bossDown'); banner('🏆 BOSS DOWN! BOOYAH! 🏆');
  const reward = ['star', 'meatball', 'triple'][(Math.random() * 3) | 0]; setTimeout(() => activatePower(reward), 900);
  nextBoss = score + 12 + level * 2; levelUp();
}
function levelUp() {
  level++; levelEl.textContent = 'LV ' + level; beep('levelup');
  if (level % 2 === 0) banner('🔥 LEVEL ' + level + ' — IT\'S GETTING WILD! 🔥');
}

// ---------- difficulty over time ----------
let playTime = 0, lastLevelTime = 0;
function difficulty() {
  const target = Math.min(Q.max, Q.base + Math.floor(level * 1.3) + Math.floor(playTime / 22));
  const speedMul = Math.min(1.7, 1 + level * 0.05 + playTime / 240);
  return { target, speedMul };
}

// ---------- sound ----------
let actx = null;
function initAudio() { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); }
function noise(dur, cut, vol) { const sr = actx.sampleRate, n = (sr * dur) | 0, buf = actx.createBuffer(1, n, sr), d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, 2);
  const s = actx.createBufferSource(); s.buffer = buf; const lp = actx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = cut;
  const g = actx.createGain(); g.gain.value = vol; s.connect(lp); lp.connect(g); g.connect(actx.destination); s.start(); }
function tone(type, f0, f1, dur, vol) { const t = actx.currentTime, o = actx.createOscillator(), g = actx.createGain();
  o.connect(g); g.connect(actx.destination); o.type = type; o.frequency.setValueAtTime(f0, t); o.frequency.exponentialRampToValueAtTime(f1, t + dur);
  g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(.001, t + dur); o.start(t); o.stop(t + dur + .02); }
function beep(k) { if (!actx) return;
  if (k === 'zap') { tone('square', 720, 130, .16, .15); noise(.08, 2400, .07); }
  else if (k === 'splat') { noise(.2, 600, .26); tone('sine', 180, 80, .18, .13); }
  else if (k === 'boom') { noise(.3, 900, .3); tone('sine', 220, 60, .3, .17); tone('triangle', 900, 1400, .14, .1); }
  else if (k === 'hit') { tone('square', 400, 200, .08, .1); }
  else if (k === 'jump') { tone('square', 300, 620, .1, .1); }
  else if (k === 'bump') { tone('sawtooth', 150, 70, .16, .12); }
  else if (k === 'power') { tone('triangle', 500, 1000, .18, .15); tone('sine', 800, 1300, .22, .1); }
  else if (k === 'levelup') { tone('square', 400, 800, .12, .12); setTimeout(() => actx && tone('square', 600, 1100, .14, .12), 110); }
  else if (k === 'bossSpawn') { tone('sawtooth', 120, 55, .5, .18); noise(.3, 300, .2); }
  else if (k === 'bossDown') { noise(.5, 1200, .4); tone('triangle', 400, 1200, .4, .18); tone('sine', 200, 50, .4, .18); }
}

$('resume').addEventListener('click', e => { e.stopPropagation(); resume(); });

// desktop pointer lock
if (!isTouch) {
  document.addEventListener('pointerlockchange', () => {
    locked = document.pointerLockElement === renderer.domElement;
    if (locked) { playing = true; overlay.classList.add('hidden'); hud.classList.remove('hidden'); }
    else if (playing) { showPause(); }
  });
  document.addEventListener('mousemove', e => { if (!locked) return; yaw -= e.movementX * 0.0022; pitch = clamp(pitch - e.movementY * 0.0022, -1.52, 1.52); });
  document.addEventListener('mousedown', () => { if (locked) mouseDown = true; });
  document.addEventListener('mouseup', () => { mouseDown = false; });
  document.addEventListener('keydown', e => { keys[e.code] = true; if (e.code === 'Space') triggerJump(); });
  document.addEventListener('keyup', e => { keys[e.code] = false; });
}

// touch controls
if (isTouch) {
  const layer = $('touch'), stickEl = $('stick'), thumbEl = $('thumb');
  let stickId = null, lookId = null, origin = { x: 0, y: 0 }, lookLast = { x: 0, y: 0 };
  const R = 55;
  layer.addEventListener('pointerdown', e => { if (!playing) return;
    if (e.clientX < innerWidth * 0.5 && stickId === null) { stickId = e.pointerId; origin = { x: e.clientX, y: e.clientY };
      stickEl.style.display = thumbEl.style.display = 'block'; stickEl.style.left = thumbEl.style.left = e.clientX + 'px'; stickEl.style.top = thumbEl.style.top = e.clientY + 'px'; }
    else if (lookId === null) { lookId = e.pointerId; lookLast = { x: e.clientX, y: e.clientY }; } });
  window.addEventListener('pointermove', e => {
    if (e.pointerId === stickId) { let dx = e.clientX - origin.x, dy = e.clientY - origin.y; const len = Math.hypot(dx, dy);
      if (len > R) { dx *= R / len; dy *= R / len; } stick.x = dx / R; stick.y = dy / R; thumbEl.style.left = (origin.x + dx) + 'px'; thumbEl.style.top = (origin.y + dy) + 'px'; }
    else if (e.pointerId === lookId) { yaw -= (e.clientX - lookLast.x) * 0.005; pitch = clamp(pitch - (e.clientY - lookLast.y) * 0.005, -1.52, 1.52); lookLast = { x: e.clientX, y: e.clientY }; } });
  function endP(e) { if (e.pointerId === stickId) { stickId = null; stick.x = stick.y = 0; stickEl.style.display = thumbEl.style.display = 'none'; }
    else if (e.pointerId === lookId) lookId = null; }
  window.addEventListener('pointerup', endP); window.addEventListener('pointercancel', endP);
  const fire = $('btnFire'); fire.addEventListener('pointerdown', e => { e.preventDefault(); setFire(true); }); fire.addEventListener('pointerup', () => setFire(false)); fire.addEventListener('pointerleave', () => setFire(false));
  $('btnJump').addEventListener('pointerdown', e => { e.preventDefault(); triggerJump(); });
  $('btnPause').addEventListener('pointerdown', e => { e.preventDefault(); showPause(); });
}
addEventListener('contextmenu', e => e.preventDefault());
addEventListener('resize', () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });

// ---------- loop ----------
const clock = new THREE.Clock();
const fwd = new THREE.Vector3(), right = new THREE.Vector3();
let shake = 0;

function update(dt) {
  playTime += dt;
  camera.rotation.set(pitch, yaw, 0);

  // movement
  camera.getWorldDirection(fwd); fwd.y = 0; fwd.normalize(); right.copy(fwd).cross(up3).normalize();
  let fA, rA;
  if (isTouch) { fA = -stick.y; rA = stick.x; } else { fA = (keys.KeyW ? 1 : 0) - (keys.KeyS ? 1 : 0); rA = (keys.KeyD ? 1 : 0) - (keys.KeyA ? 1 : 0); }
  const mv = new THREE.Vector3().addScaledVector(fwd, fA).addScaledVector(right, rA);
  if (mv.lengthSq() > 1) mv.normalize();
  const moving = mv.lengthSq() > 0.0004;
  camera.position.addScaledVector(mv, MOVE * dt);
  velY -= GRAVITY * dt; camera.position.y += velY * dt;
  if (camera.position.y <= EYE) { camera.position.y = EYE; velY = 0; onGround = true; }
  const lim = WORLD - 2;
  camera.position.x = clamp(camera.position.x, -lim, lim); camera.position.z = clamp(camera.position.z, -lim, lim);
  if (moving && onGround) camera.position.y = EYE + Math.sin(clock.elapsedTime * 11) * 0.06;

  // shooting
  shootCD -= dt;
  const cd = (power.type === 'rapid' || power.type === 'star') ? 0.08 : (power.type === 'meatball' ? 0.3 : titan.cd);
  if (mouseDown && shootCD <= 0) { shoot(); shootCD = cd; }
  gun.position.z += (GUN_HOME.z - gun.position.z) * Math.min(1, dt * 12);
  if (muzzle.visible) { muzzle.scale.multiplyScalar(0.8); if (muzzle.scale.x < 0.2) muzzle.visible = false; }

  // power timer
  if (power.type) { power.time -= dt; if (power.time <= 0) { power.type = null; updatePowerHud(); } else updatePowerHud(); }

  // projectiles
  for (let i = balls.length - 1; i >= 0; i--) { const b = balls[i]; const u = b.userData;
    if (!u.meat) u.vel.y -= 8 * dt; else u.vel.y -= 14 * dt;
    b.position.addScaledVector(u.vel, dt); u.life -= dt; let dead = false;
    if (u.bounce && b.position.y < u.radius) { b.position.y = u.radius; u.vel.y = Math.abs(u.vel.y) * 0.7; }
    for (const m of monsters) { if (u.hit.has(m)) continue;
      if (b.position.distanceTo(m.position) < m.userData.size + u.radius) { u.hit.add(m); damage(m, u.meat ? 2 : 1, b.position);
        if (u.pierce > 0) u.pierce--; else { dead = true; break; } } }
    if (dead || u.life <= 0 || (b.position.y < -1 && !u.bounce)) { scene.remove(b); balls.splice(i, 1); }
  }

  // monsters
  const diff = difficulty();
  for (const m of monsters) { const u = m.userData;
    if (u.grow < 1) { u.grow = Math.min(1, u.grow + dt * 3); m.scale.setScalar(u.grow); }
    u.wander += rand(-1, 1) * dt;
    const toP = new THREE.Vector3().subVectors(camera.position, m.position); toP.y = 0; const dist = toP.length(); toP.normalize();
    const wd = new THREE.Vector3(Math.cos(u.wander), 0, Math.sin(u.wander));
    const dir = toP.clone().multiplyScalar(u.isBoss ? 0.85 : 0.7).add(wd.multiplyScalar(u.isBoss ? 0.15 : 0.3)).normalize();
    if (dist > (u.isBoss ? 3.4 : 2.4)) m.position.addScaledVector(dir, u.speed * diff.speedMul * dt);
    m.position.x = clamp(m.position.x, -lim, lim); m.position.z = clamp(m.position.z, -lim, lim);
    m.rotation.y = Math.atan2(dir.x, dir.z);
    u.bob += dt * (u.isBoss ? 4 : 7);
    m.position.y = u.size * 0.95 + Math.abs(Math.sin(u.bob)) * (u.isBoss ? 0.5 : 0.35);
    m.rotation.z = Math.sin(u.bob) * 0.1;
    if (u.iris) u.iris.material.emissiveIntensity = 0.45 + Math.abs(Math.sin(u.bob * 0.5)) * 0.4;
    if (u.hitFlash > 0) { u.hitFlash -= dt; m.scale.setScalar(u.grow * (1 + u.hitFlash * 0.6)); }
    if (dist < (u.isBoss ? 3.6 : 1.7)) { m.position.addScaledVector(toP, -u.speed * dt * 4); shake = 0.25; if (Math.random() < 0.04) beep('bump'); }
  }

  // keep stocked (don't auto-spawn while a boss is out so the fight stays clean-ish)
  const cap = bossActive ? Math.max(4, diff.target - 6) : diff.target;
  let guard = 0;
  while (monsters.length < cap && guard++ < 4) {
    const r = Math.random();
    if (level >= 2 && r < 0.06) makeMonster({ golden: true });
    else if (level >= 3 && r < 0.20) makeMonster({ splitter: true });
    else makeMonster();
  }
  countEl.textContent = '👾 Monsters: ' + monsters.filter(x => !x.userData.isBoss).length;

  // timed difficulty bump
  if (playTime - lastLevelTime > 24) { lastLevelTime = playTime; levelUp(); }

  // power-up pickups appear over time
  pickupTimer -= dt;
  if (pickupTimer <= 0 && pickups.length < 2) { spawnPickup(); pickupTimer = rand(12, 20); }
  for (let i = pickups.length - 1; i >= 0; i--) { const g = pickups[i]; g.userData.bob += dt * 2;
    g.position.y = 1.3 + Math.sin(g.userData.bob) * 0.25; g.rotation.y += dt * 2; g.children[0].rotation.x += dt * 1.5;
    const dx = g.position.x - camera.position.x, dz = g.position.z - camera.position.z;
    if (dx * dx + dz * dz < 5.3) { activatePower(g.userData.type); scene.remove(g); pickups.splice(i, 1); } }

  // particles
  for (let i = particles.length - 1; i >= 0; i--) { const p = particles[i];
    p.userData.vel.y -= 14 * dt; p.position.addScaledVector(p.userData.vel, dt);
    p.rotation.x += p.userData.spin * dt; p.rotation.y += p.userData.spin * dt; p.userData.life -= dt;
    p.scale.setScalar(Math.max(0.01, p.userData.life)); if (p.userData.life <= 0) { scene.remove(p); particles.splice(i, 1); } }

  // clouds
  for (const c of clouds) { c.position.x += c.userData.drift * dt; if (c.position.x > WORLD + 12) c.position.x = -WORLD - 12; }

  // screen shake
  if (shake > 0) { shake -= dt; camera.rotation.z = Math.sin(clock.elapsedTime * 40) * shake * 0.05; } else camera.rotation.z = 0;
}

function animate() { requestAnimationFrame(animate); const dt = Math.min(0.05, clock.getDelta()); if (playing) update(dt); renderer.render(scene, camera); }

for (let i = 0; i < Q.base; i++) makeMonster();
updateScore();
$('loading').classList.add('hidden');
animate();
</script>
</body>
</html>
