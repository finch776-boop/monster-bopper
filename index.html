<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#1a1030" />
<title>⚡ Teen Titans GO! — Monster Bopper ⚡</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1030;
    font-family: 'Arial Black', 'Trebuchet MS', system-ui, sans-serif; user-select: none; -webkit-user-select: none; }
  canvas { display: block; touch-action: none; }

  /* ---------- HUD ---------- */
  #hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; color: #fff;
    text-shadow: 0 2px 5px rgba(0,0,0,.6), 0 0 2px rgba(0,0,0,.8); }
  #topleft { position: absolute; top: calc(12px + env(safe-area-inset-top)); left: calc(14px + env(safe-area-inset-left)); }
  #lives { font-size: 22px; letter-spacing: 2px; }
  #hpwrap { width: 210px; height: 18px; margin-top: 4px; background: rgba(0,0,0,.5); border: 2px solid #fff; border-radius: 10px; overflow: hidden; }
  #hp { height: 100%; width: 100%; background: linear-gradient(90deg, #ff4d4d, #ffd23f, #5fc14e); transition: width .15s; }
  #score { font-size: 24px; font-weight: 900; color: #ffd23f; -webkit-text-stroke: 1.4px #1a1030; margin-top: 5px; }
  #level { display: inline-block; font-size: 16px; font-weight: 900; color: #ff7a00; -webkit-text-stroke: .8px #1a1030; margin-left: 8px; }
  #power { margin-top: 5px; display: none; align-items: center; gap: 6px; font-size: 14px; font-weight: 900; -webkit-text-stroke: .4px #1a1030; }
  #power .pbar { width: 80px; height: 8px; border-radius: 5px; background: rgba(255,255,255,.25); overflow: hidden; }
  #power .pfill { height: 100%; background: #ffd23f; }
  #safezone { margin-top: 5px; font-size: 16px; font-weight: 900; color: #7dff5a; display: none; }
  #bossbar { position: absolute; top: calc(12px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
    width: min(420px, 70vw); text-align: center; display: none; }
  #bossname { font-size: 17px; font-weight: 900; color: #ff4d4d; -webkit-text-stroke: 1px #1a1030; margin-bottom: 3px; letter-spacing: 1px; }
  #bosshpwrap { height: 15px; background: rgba(0,0,0,.45); border: 2px solid #fff; border-radius: 9px; overflow: hidden; }
  #bosshp { height: 100%; width: 100%; background: linear-gradient(90deg, #ff7a00, #ff2e2e); transition: width .12s; }
  #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 30px; height: 30px; }
  #crosshair::before, #crosshair::after { content: ''; position: absolute; background: var(--reticle, #29d3ff); box-shadow: 0 0 6px var(--reticle, #29d3ff), 0 0 2px #000; }
  #crosshair::before { left: 50%; top: 0; width: 3px; height: 100%; transform: translateX(-50%); border-radius: 3px; }
  #crosshair::after  { top: 50%; left: 0; height: 3px; width: 100%; transform: translateY(-50%); border-radius: 3px; }
  #crosshair .dot { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; transform: translate(-50%,-50%);
    background: #fff; border: 2px solid var(--reticle, #29d3ff); border-radius: 50%; box-shadow: 0 0 8px var(--reticle, #29d3ff); }
  #hurt { position: absolute; inset: 0; background: radial-gradient(circle, transparent 40%, rgba(255,0,0,.55)); opacity: 0; transition: opacity .1s; }
  .popup { position: absolute; font-size: 28px; font-weight: 900; color: #ffd23f; -webkit-text-stroke: 2px #1a1030;
    text-shadow: 0 3px 8px rgba(0,0,0,.6); animation: floatUp .9s ease-out forwards; white-space: nowrap; }
  @keyframes floatUp { from { opacity: 1; transform: translate(-50%,-50%) scale(.5) rotate(-6deg); }
    to { opacity: 0; transform: translate(-50%,-160%) scale(1.25) rotate(4deg); } }
  #banner { position: absolute; top: 28%; left: 50%; transform: translate(-50%,-50%); font-size: 40px; font-weight: 900;
    color: #fff; -webkit-text-stroke: 3px #7b2fd0; text-shadow: 0 4px 0 #4a1a85; text-align: center; opacity: 0; white-space: nowrap; }
  #banner.show { animation: bannerPop 1.9s ease-out forwards; }
  @keyframes bannerPop { 0% { opacity: 0; transform: translate(-50%,-50%) scale(.4) rotate(-4deg); }
    18% { opacity: 1; transform: translate(-50%,-50%) scale(1.12) rotate(2deg); } 78% { opacity: 1; transform: translate(-50%,-50%) scale(1) rotate(0); }
    100% { opacity: 0; transform: translate(-50%,-86%) scale(1); } }

  /* ---------- top-right buttons ---------- */
  .corner { position: fixed; z-index: 11; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    color: #fff; background: rgba(26,16,48,.55); border: 2px solid rgba(255,255,255,.5); font-size: 18px; cursor: pointer; }
  #btnMute { top: calc(12px + env(safe-area-inset-top)); right: calc(66px + env(safe-area-inset-right)); width: 44px; height: 44px; display: none; }
  #btnPause { top: calc(12px + env(safe-area-inset-top)); right: calc(14px + env(safe-area-inset-right)); width: 44px; height: 44px; display: none; }
  body.playing #btnMute, body.playing #btnPause { display: flex; }

  /* ---------- Touch controls ---------- */
  #touch { position: fixed; inset: 0; z-index: 8; touch-action: none; display: none; }
  body.touch.playing #touch { display: block; }
  #stick { position: fixed; width: 120px; height: 120px; border-radius: 50%; border: 3px solid rgba(255,255,255,.4);
    background: rgba(255,255,255,.08); transform: translate(-50%,-50%); display: none; z-index: 9; pointer-events: none; }
  #thumb { position: fixed; width: 56px; height: 56px; border-radius: 50%; background: rgba(127,212,255,.55);
    border: 3px solid #fff; transform: translate(-50%,-50%); display: none; z-index: 9; pointer-events: none; }
  .touchbtn { position: fixed; z-index: 11; border-radius: 50%; display: none; align-items: center; justify-content: center;
    font-weight: 900; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,.5); touch-action: none; }
  body.touch.playing .touchbtn { display: flex; }
  #btnFire { right: calc(24px + env(safe-area-inset-right)); bottom: calc(28px + env(safe-area-inset-bottom));
    width: 104px; height: 104px; background: radial-gradient(circle at 40% 35%, #ff7b7b, #d42a2a); border: 5px solid #fff; font-size: 18px; box-shadow: 0 6px 0 #951c1c; }
  #btnFire:active { transform: translateY(3px); box-shadow: 0 3px 0 #951c1c; }
  #btnJump { right: calc(138px + env(safe-area-inset-right)); bottom: calc(34px + env(safe-area-inset-bottom));
    width: 78px; height: 78px; background: radial-gradient(circle at 40% 35%, #5bc0ff, #1a86c8); border: 4px solid #fff; font-size: 16px; box-shadow: 0 5px 0 #115a86; }
  #btnJump:active { transform: translateY(3px); box-shadow: 0 2px 0 #115a86; }
  #btnBomb { right: calc(150px + env(safe-area-inset-right)); bottom: calc(120px + env(safe-area-inset-bottom));
    width: 70px; height: 70px; background: radial-gradient(circle at 40% 35%, #b6e36a, #6a9a2a); border: 4px solid #fff; font-size: 26px; box-shadow: 0 5px 0 #4a6a1a; }
  #btnBomb:active { transform: translateY(3px); box-shadow: 0 2px 0 #4a6a1a; }
  #btnBomb.cooling { filter: grayscale(.8) brightness(.7); }

  /* ---------- Overlay ---------- */
  #overlay { position: fixed; inset: 0; z-index: 20; display: flex; overflow: auto; cursor: pointer;
    flex-direction: column; align-items: center; justify-content: center; text-align: center;
    background: radial-gradient(circle at 50% 22%, rgba(120,90,210,.55), rgba(20,12,42,0) 55%),
      linear-gradient(180deg, #2a1a55 0%, #1a1030 55%, #0d0820 100%); color: #fff; padding: 14px; }
  #overlay .burst { position: absolute; top: 22%; left: 50%; width: 900px; height: 900px; transform: translate(-50%,-50%);
    pointer-events: none; opacity: .28; background: repeating-conic-gradient(from 0deg, #ffd23f 0deg 8deg, transparent 8deg 16deg);
    -webkit-mask: radial-gradient(circle, #000 0 38%, transparent 60%); mask: radial-gradient(circle, #000 0 38%, transparent 60%); animation: spin 28s linear infinite; }
  @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }
  .tt { font-size: clamp(32px, 7.5vw, 54px); font-weight: 900; color: #fff; -webkit-text-stroke: 3px #7b2fd0;
    text-shadow: 0 5px 0 #4a1a85, 0 8px 16px rgba(0,0,0,.5); transform: skewY(-3deg); z-index: 1; }
  .sub { font-size: clamp(18px, 4.5vw, 28px); font-weight: 900; margin-top: 2px; color: #ff7a00; -webkit-text-stroke: 2px #1a1030; text-shadow: 0 3px 0 #a04e00; z-index: 1; }
  .choose { z-index: 1; margin: 14px 0 8px; font-size: 18px; font-weight: 900; color: #7fd4ff; letter-spacing: 1px; }
  #titanGrid { z-index: 1; display: flex; gap: 9px; flex-wrap: wrap; justify-content: center; max-width: 680px; }
  .titan { background: rgba(255,255,255,.08); border: 3px solid rgba(255,255,255,.25); border-radius: 16px; padding: 10px 9px 8px; width: 120px; cursor: pointer; transition: transform .12s, border-color .12s, background .12s; color: #fff; }
  .titan:hover { transform: translateY(-3px); }
  .titan.sel { border-color: #ffd23f; background: rgba(255,210,63,.18); transform: translateY(-4px) scale(1.04); }
  .titan .orb { width: 50px; height: 50px; border-radius: 50%; margin: 0 auto 7px; border: 3px solid rgba(255,255,255,.85); box-shadow: 0 3px 10px rgba(0,0,0,.4); }
  .titan .nm { font-size: 16px; font-weight: 900; }
  .titan .pk { font-size: 10px; opacity: .85; margin-top: 3px; line-height: 1.25; }
  #go { z-index: 1; margin-top: 16px; background: linear-gradient(180deg, #ff4d4d, #d42a2a); color: #fff; font-weight: 900; font-size: 26px; padding: 14px 48px; border: 4px solid #fff; border-radius: 40px; letter-spacing: 1px; cursor: pointer; box-shadow: 0 8px 0 #951c1c, 0 12px 20px rgba(0,0,0,.4); animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  .ctlhint { z-index: 1; margin-top: 12px; font-size: 13px; color: #cdbcff; line-height: 1.5; }
  #pauseScreen .tt, #overScreen .tt { font-size: 44px; }
  #overScreen .sub { color: #ffd23f; }
  .hidden { display: none !important; }
  #loading { position: fixed; inset: 0; z-index: 30; display: flex; align-items: center; justify-content: center; background: #1a1030; color: #7fd4ff; font-size: 22px; font-weight: 900; }
</style>
</head>
<body>
  <div id="loading">Booting up Jump City… ⚡</div>

  <div id="hud" class="hidden">
    <div id="topleft">
      <div id="lives">❤️❤️❤️</div>
      <div id="hpwrap"><div id="hp"></div></div>
      <div id="score">💥 0 <span id="level">LV 1</span></div>
      <div id="power"><span id="powicon">⚡</span><span id="powname">RAPID</span><span class="pbar"><span class="pfill" id="powfill"></span></span></div>
      <div id="safezone">🛡 SAFE ZONE</div>
    </div>
    <div id="bossbar"><div id="bossname">BOSS</div><div id="bosshpwrap"><div id="bosshp"></div></div></div>
    <div id="crosshair"><span class="dot"></span></div>
    <div id="banner"></div>
    <div id="hurt"></div>
  </div>

  <div id="touch"><div id="stick"></div><div id="thumb"></div></div>
  <div id="btnBomb" class="touchbtn">💨</div>
  <div id="btnJump" class="touchbtn">JUMP</div>
  <div id="btnFire" class="touchbtn">FIRE</div>
  <div id="btnMute" class="corner">🔊</div>
  <div id="btnPause" class="corner">⏸</div>

  <div id="overlay">
    <div class="burst"></div>
    <div id="selectScreen">
      <div class="tt">TEEN TITANS GO!</div>
      <div class="sub">MONSTER BOPPER</div>
      <div class="choose">⬇ CHOOSE YOUR TITAN ⬇</div>
      <div id="titanGrid"></div>
      <div id="go">▶ TITANS GO!</div>
      <div class="ctlhint" id="ctlhint"></div>
    </div>
    <div id="pauseScreen" class="hidden">
      <div class="tt">⏸️ PAUSED</div><div class="sub">MONSTER BOPPER</div>
      <div id="resume" style="margin-top:22px;background:linear-gradient(180deg,#5bc0ff,#1a86c8);color:#fff;font-weight:900;font-size:24px;padding:14px 44px;border:4px solid #fff;border-radius:40px;box-shadow:0 7px 0 #115a86;cursor:pointer;">▶ Keep Playing</div>
    </div>
    <div id="overScreen" class="hidden">
      <div class="tt">💀 GAME OVER</div><div class="sub" id="finalScore">Score: 0</div>
      <div id="again" style="margin-top:22px;background:linear-gradient(180deg,#ff4d4d,#d42a2a);color:#fff;font-weight:900;font-size:24px;padding:14px 44px;border:4px solid #fff;border-radius:40px;box-shadow:0 7px 0 #951c1c;cursor:pointer;">▶ PLAY AGAIN</div>
    </div>
  </div>

<script type="module">
import * as THREE from './three.module.js';

/* =====================================================================
   TEEN TITANS GO! — MONSTER BOPPER  v2
   Toon-shaded Jump City. Health/lives, distinct Titans, varied noisy
   monsters, bosses, power-ups, fart bombs, tower safe zone, music.
   ===================================================================== */

const forceTouch = new URLSearchParams(location.search).has('touch');
const isTouch = forceTouch || (matchMedia('(pointer: coarse)').matches && navigator.maxTouchPoints > 0);
const Q = isTouch
  ? { pr: Math.min(devicePixelRatio, 1.5), aa: false, shadows: false, trees: 12, rocks: 6, bushes: 8, flowers: 14, city: 26, clouds: 7, base: 6, max: 15, spikes: 7, parts: 12, outline: true, fog: [70, 200] }
  : { pr: Math.min(devicePixelRatio, 2),  aa: true,  shadows: true,  trees: 24, rocks: 14, bushes: 18, flowers: 44, city: 46, clouds: 12, base: 9, max: 24, spikes: 12, parts: 20, outline: true, fog: [85, 300] };

// ---------- core ----------
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xa9e6ff, Q.fog[0], Q.fog[1]);
const camera = new THREE.PerspectiveCamera(74, innerWidth / innerHeight, 0.1, 800);
camera.rotation.order = 'YXZ'; camera.position.set(0, 1.7, 24); scene.add(camera);
const renderer = new THREE.WebGLRenderer({ antialias: Q.aa });
renderer.setSize(innerWidth, innerHeight); renderer.setPixelRatio(Q.pr);
renderer.shadowMap.enabled = Q.shadows; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ---------- toon look ----------
function toonGradient(steps) { const c = document.createElement('canvas'); c.width = steps; c.height = 1; const x = c.getContext('2d');
  for (let i = 0; i < steps; i++) { const v = Math.round(80 + 175 * (i / (steps - 1))); x.fillStyle = `rgb(${v},${v},${v})`; x.fillRect(i, 0, 1, 1); }
  const t = new THREE.CanvasTexture(c); t.minFilter = THREE.NearestFilter; t.magFilter = THREE.NearestFilter; return t; }
const TOON = toonGradient(4);
const OUTLINE_MAT = new THREE.MeshBasicMaterial({ color: 0x12101e, side: THREE.BackSide });
function toon(color, opts = {}) { const { flatShading, ...rest } = opts; return new THREE.MeshToonMaterial({ color, gradientMap: TOON, emissive: rest.emissive || 0, ...rest }); }
function outline(mesh, s = 1.07) { if (!Q.outline) return; const o = new THREE.Mesh(mesh.geometry, OUTLINE_MAT); o.scale.multiplyScalar(s); mesh.add(o); }

// ---------- sky ----------
(function sky() { const c = document.createElement('canvas'); c.width = 2; c.height = 256; const x = c.getContext('2d');
  const g = x.createLinearGradient(0, 0, 0, 256); g.addColorStop(0, '#3fb6ff'); g.addColorStop(0.55, '#7fd4ff'); g.addColorStop(1, '#c8f0ff');
  x.fillStyle = g; x.fillRect(0, 0, 2, 256); const tex = new THREE.CanvasTexture(c);
  const dome = new THREE.Mesh(new THREE.SphereGeometry(600, 24, 16), new THREE.MeshBasicMaterial({ map: tex, side: THREE.BackSide, fog: false })); scene.add(dome); })();

// ---------- lighting ----------
scene.add(new THREE.HemisphereLight(0xdff1ff, 0x88aa66, 1.0));
scene.add(new THREE.AmbientLight(0xffffff, 0.35));
const sun = new THREE.DirectionalLight(0xfff4d6, 1.15); sun.position.set(45, 80, 30);
if (Q.shadows) { sun.castShadow = true; sun.shadow.mapSize.set(2048, 2048); sun.shadow.camera.near = 1; sun.shadow.camera.far = 260;
  const S = 120; sun.shadow.camera.left = -S; sun.shadow.camera.right = S; sun.shadow.camera.top = S; sun.shadow.camera.bottom = -S; sun.shadow.bias = -0.0004; }
scene.add(sun);

// ---------- helpers ----------
const WORLD = 100, up3 = new THREE.Vector3(0, 1, 0);
const rand = (a, b) => a + Math.random() * (b - a), clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const $ = id => document.getElementById(id);
function place(o, e = 6) { o.position.x = rand(-WORLD + e, WORLD - e); o.position.z = rand(-WORLD + e, WORLD - e); return o; }
function castS(m) { if (Q.shadows) m.castShadow = true; return m; }

// ---------- water bay + island ground ----------
const water = new THREE.Mesh(new THREE.PlaneGeometry(1600, 1600), toon(0x2f7fd6, { emissive: 0x103a66, emissiveIntensity: .25 }));
water.rotation.x = -Math.PI / 2; water.position.y = -0.6; scene.add(water);
const ground = new THREE.Mesh(new THREE.CircleGeometry(WORLD + 14, 48), toon(0x7ec84f));
ground.rotation.x = -Math.PI / 2; ground.position.y = 0; ground.receiveShadow = Q.shadows; scene.add(ground);
const beach = new THREE.Mesh(new THREE.RingGeometry(WORLD + 8, WORLD + 16, 48), toon(0xe9d9a0));
beach.rotation.x = -Math.PI / 2; beach.position.y = -0.05; scene.add(beach);

const hillMat = toon(0x86ce57);
for (let i = 0; i < 10; i++) { const r = rand(7, 15); const h = new THREE.Mesh(new THREE.SphereGeometry(r, 14, 10), hillMat);
  place(h, r); h.position.y = rand(-r * .85, -r * .6); h.scale.y = rand(.25, .42); h.receiveShadow = Q.shadows; scene.add(h); }

const trunkMat = toon(0x9c6b3f);
const leafMats = [0x49b34a, 0x69c46a, 0x3fa83f, 0x82c43f].map(c => toon(c));
function makeTree() { const g = new THREE.Group(); const h = rand(3, 5);
  const t = castS(new THREE.Mesh(new THREE.CylinderGeometry(.35, .5, h, 8), trunkMat)); t.position.y = h / 2; g.add(t);
  const m = leafMats[(Math.random() * leafMats.length) | 0];
  for (let i = 0; i < 2; i++) { const b = castS(new THREE.Mesh(new THREE.SphereGeometry(rand(1.7, 2.4), 9, 7), m)); b.position.set(rand(-.6, .6), h + rand(0, 1.3), rand(-.6, .6)); if (i === 0) outline(b, 1.05); g.add(b); } return g; }
for (let i = 0; i < Q.trees; i++) scene.add(place(makeTree()));

const rockMat = toon(0x9aa0a6, { flatShading: true });
for (let i = 0; i < Q.rocks; i++) { const r = castS(new THREE.Mesh(new THREE.DodecahedronGeometry(rand(.8, 1.8)), rockMat)); place(r); r.position.y = rand(.1, .5); r.rotation.set(rand(0, 6), rand(0, 6), rand(0, 6)); scene.add(r); }

const bushMat = toon(0x3f9d4a);
for (let i = 0; i < Q.bushes; i++) { const b = castS(new THREE.Mesh(new THREE.SphereGeometry(rand(.7, 1.3), 8, 6), bushMat)); place(b); b.position.y = rand(.3, .6); b.scale.y = .75; scene.add(b); }

const flowerColors = [0xff5d8f, 0xffd83d, 0xff8a3d, 0xb56bff, 0xff5d5d, 0xffffff];
for (let i = 0; i < Q.flowers; i++) { const g = new THREE.Group();
  const s = new THREE.Mesh(new THREE.CylinderGeometry(.04, .04, .6, 5), toon(0x3f9d4a)); s.position.y = .3; g.add(s);
  const p = new THREE.Mesh(new THREE.SphereGeometry(.18, 7, 6), toon(flowerColors[(Math.random() * flowerColors.length) | 0], { emissive: 0x222200 })); p.position.y = .62; p.scale.y = .6; g.add(p); place(g, 2); scene.add(g); }

const clouds = [];
const cloudMat = toon(0xffffff, { emissive: 0x99bbdd, emissiveIntensity: .15 });
for (let i = 0; i < Q.clouds; i++) { const c = new THREE.Group(); for (let j = 0; j < 4; j++) { const pf = new THREE.Mesh(new THREE.SphereGeometry(rand(2.5, 4.5), 7, 6), cloudMat); pf.position.set(rand(-4, 4), rand(-.6, .6), rand(-3, 3)); c.add(pf); }
  c.position.set(rand(-WORLD, WORLD), rand(40, 60), rand(-WORLD, WORLD)); c.userData.drift = rand(.6, 1.6); clouds.push(c); scene.add(c); }

// shoreline railing
const railMat = toon(0xd0d6dc, { emissive: 0x223044, emissiveIntensity: .1 });
for (let k = 0; k < 60; k++) { const a = k / 60 * Math.PI * 2; const post = new THREE.Mesh(new THREE.CylinderGeometry(.5, .5, 2.2, 8), railMat); post.position.set(Math.cos(a) * (WORLD + 6), 1, Math.sin(a) * (WORLD + 6)); scene.add(post); }

// ---------- Jump City skyline (denser, bolder) ----------
(function city() { const c = document.createElement('canvas'); c.width = 64; c.height = 128; const x = c.getContext('2d');
  x.fillStyle = '#33445e'; x.fillRect(0, 0, 64, 128);
  for (let yy = 6; yy < 128; yy += 11) for (let xx = 6; xx < 64; xx += 11) { x.fillStyle = Math.random() < .5 ? '#ffe27a' : '#3c5474'; x.fillRect(xx, yy, 7, 7); }
  const base = new THREE.CanvasTexture(c); base.wrapS = base.wrapT = THREE.RepeatWrapping;
  const tints = [0x5a7fae, 0x6a5aae, 0x4a86b0, 0x8a5aa0, 0x4aa098, 0x9a6a5a];
  const N = Q.city; for (let i = 0; i < N; i++) { const a = (i / N) * Math.PI * 2 + rand(-.04, .04); const r = rand(150, 235);
    const w = rand(10, 20), h = rand(28, 95), d = rand(10, 20); const tex = base.clone(); tex.needsUpdate = true; tex.repeat.set(Math.max(1, w / 5), Math.max(1, h / 7));

const livesEl = $('lives'), hpEl = $('hp'), scoreEl = $('score'), levelEl = $('level'), bannerEl = $('banner'), hurtEl = $('hurt');
const powerEl = $('power'), powIcon = $('powicon'), powName = $('powname'), powFill = $('powfill');
const bossEl = $('bossbar'), bossNameEl = $('bossname'), bossHpEl = $('bosshp'), safeEl = $('safezone');
function updateScore() { scoreEl.firstChild.textContent = '💥 ' + score + ' '; }
function updateHP() { hpEl.style.width = clamp(hp / maxHP * 100, 0, 100) + '%'; }
function updateLives() { livesEl.textContent = '❤️'.repeat(Math.max(0, lives)); }
function updatePowerHud() { if (!power.type) { powerEl.style.display = 'none'; return; } const info = POWERS[power.type]; powerEl.style.display = 'flex'; powIcon.textContent = info.icon; powName.textContent = info.name; powName.style.color = info.css; powFill.style.width = (power.time / power.dur * 100) + '%'; powFill.style.background = info.css; }

const POPUPS = ['BOOYAH! 💥', 'POW! 💥', 'ZAP! ⚡', 'GOTCHA! 💫', 'BAM! 🔥', 'YEET! 🚀'];
function showPopup(t) { const el = document.createElement('div'); el.className = 'popup'; el.textContent = t; el.style.left = (50 + rand(-7, 7)) + '%'; el.style.top = (45 + rand(-4, 4)) + '%'; $('hud').appendChild(el); setTimeout(() => el.remove(), 900); }

// ---------- damage / pop / boss ----------
const BOSS_NAMES = ['MEGA CYCLOPS', 'SIR SPIKES-A-LOT', 'GLARG THE GIANT', 'STOMPZILLA', 'THE BLOB KING', 'ONE-EYED OZ', 'LORD STINKBOTTOM'];
function damage(m, dmg, fromPos) { const u = m.userData; u.hp -= dmg; u.hitFlash = .18; monsterSound('hurt', u.voice);
  if (u.hp <= 0) { popMonster(m); return; }
  poof(m.position.clone().setY(m.position.y + u.size * .3), u.color, 6);
  m.position.add(new THREE.Vector3().subVectors(m.position, fromPos).setY(0).normalize().multiplyScalar(.6));
  if (u.isBoss) bossHpEl.style.width = (u.hp / u.maxhp * 100) + '%'; beep('hit'); }
function popMonster(m) { const u = m.userData; if (u.isBoss) { defeatBoss(m); return; }
  poof(m.position.clone().setY(m.position.y + u.size * .3), u.color); monsterSound('pop', u.voice);
  scene.remove(m); const i = monsters.indexOf(m); if (i >= 0) monsters.splice(i, 1);
  score += u.score; updateScore(); showPopup(POPUPS[(Math.random() * POPUPS.length) | 0]);
  if (Math.random() < .15) beep('fartlet'); // silly surprise
  if (u.golden) { banner('✨ GOLDEN! BONUS! ✨'); spawnPickup(null, m.position); }
  if (u.splitter) for (let k = 0; k < 2; k++) makeMonster({ mini: true, pos: m.position.clone().add(new THREE.Vector3(rand(-1.5, 1.5), 0, rand(-1.5, 1.5))) });
  checkBoss(); }
function checkBoss() { if (!bossActive && score >= nextBoss) triggerBoss(); }
function triggerBoss() { bossActive = true; bossRef = makeMonster({ boss: true, hp: 7 + level * 3 });
  bossNameEl.textContent = BOSS_NAMES[(Math.random() * BOSS_NAMES.length) | 0]; bossHpEl.style.width = '100%'; bossEl.style.display = 'block'; banner('⚠️ BOSS INCOMING! ⚠️'); beep('bossSpawn'); }
function defeatBoss(m) { poof(m.position.clone().setY(m.position.y + 1), m.userData.color, 50); poof(m.position.clone().setY(m.position.y + 2), 0xffd23f, 30);
  scene.remove(m); const i = monsters.indexOf(m); if (i >= 0) monsters.splice(i, 1); bossActive = false; bossRef = null; bossEl.style.display = 'none';
  score += 12; updateScore(); beep('bossDown'); banner('🏆 BOSS DOWN! BOOYAH! 🏆');
  const reward = ['star', 'meatball', 'triple'][(Math.random() * 3) | 0]; setTimeout(() => collectPickup(reward), 900);
  spawnPickup('life', m.position); nextBoss = score + 12 + level * 2; levelUp(); }
function levelUp() { level++; levelEl.textContent = 'LV ' + level; beep('levelup'); if (level % 2 === 0) banner('🔥 LEVEL ' + level + ' — GETTING WILD! 🔥'); }

// player hurt / death
function hurtPlayer(dmg, fromPos) { if (invuln > 0 || inside || !playing) return; hp -= dmg; invuln = 1.0; updateHP();
  hurtEl.style.opacity = .9; setTimeout(() => hurtEl.style.opacity = 0, 120); shake = .4; beep('ouch');
  const kb = new THREE.Vector3().subVectors(camera.position, fromPos).setY(0); if (kb.lengthSq() > 0) camera.position.addScaledVector(kb.normalize(), 1.5);
  if (hp <= 0) loseLife(); }
function loseLife() { lives--; updateLives();
  if (lives < 0) { gameOver(); return; }
  hp = maxHP; invuln = 2.2; updateHP(); banner('😵 OOPS! Lost a life!'); beep('dizzy'); }
function gameOver() { playing = false; document.body.classList.remove('playing'); music(false);
  selectScreen.classList.add('hidden'); pauseScreen.classList.add('hidden'); overScreen.classList.remove('hidden'); overlay.classList.remove('hidden'); hud.classList.add('hidden');
  $('finalScore').textContent = 'Score: ' + score; beep('gameover'); }

// ---------- difficulty ----------
let playTime = 0, lastLevelTime = 0;
function difficulty() { return { target: Math.min(Q.max, Q.base + Math.floor(level * 1.3) + Math.floor(playTime / 24)), speedMul: Math.min(1.7, 1 + level * .05 + playTime / 260) }; }

// ---------- sound + music ----------
const snd = { ready: false };
let actx = null, master = null, musicGain = null, sfxGain = null;
function initAudio() { if (actx) return; actx = new (window.AudioContext || window.webkitAudioContext)();
  master = actx.createGain(); master.gain.value = .9; master.connect(actx.destination);
  musicGain = actx.createGain(); musicGain.gain.value = .22; musicGain.connect(master);
  sfxGain = actx.createGain(); sfxGain.gain.value = .9; sfxGain.connect(master); snd.ready = true; }
function noise(dur, cut, vol, dest) { const sr = actx.sampleRate, n = (sr * dur) | 0, buf = actx.createBuffer(1, n, sr), d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, 2); const s = actx.createBufferSource(); s.buffer = buf;
  const lp = actx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = cut; const g = actx.createGain(); g.gain.value = vol; s.connect(lp); lp.connect(g); g.connect(dest || sfxGain); s.start(); }

  o.type = type; o.frequency.setValueAtTime(f0, t); o.frequency.exponentialRampToValueAtTime(Math.max(1, f1), t + dur); g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(.001, t + dur); o.start(t); o.stop(t + dur + .02); }
function beep(k) { if (!snd.ready) return;
  if (k === 'zap') { tone('square', 720, 130, .15, .14); }
  else if (k === 'splat') { noise(.2, 600, .24); tone('sine', 180, 80, .18, .12); }
  else if (k === 'boom') { noise(.3, 900, .28); tone('sine', 220, 60, .3, .16); }
  else if (k === 'hit') { tone('square', 400, 200, .08, .09); }
  else if (k === 'jump') { tone('square', 300, 680, .12, .1); noise(.05, 1800, .04); }
  else if (k === 'ouch') { tone('square', 500, 160, .18, .16); }
  else if (k === 'dizzy') { tone('sine', 700, 200, .5, .16); tone('sine', 500, 150, .55, .12); }
  else if (k === 'power') { tone('triangle', 500, 1000, .18, .15); tone('sine', 800, 1300, .22, .1); }
  else if (k === 'life') { tone('square', 500, 900, .1, .12); setTimeout(() => snd.ready && tone('square', 800, 1300, .14, .12), 100); }
  else if (k === 'levelup') { tone('square', 400, 800, .12, .12); setTimeout(() => snd.ready && tone('square', 600, 1100, .14, .12), 110); }
  else if (k === 'toss') { tone('sine', 300, 600, .15, .1); }
  else if (k === 'fart') { fartSound(.55, 1); }
  else if (k === 'fartlet') { fartSound(.25, 1.6); }
  else if (k === 'bossSpawn') { tone('sawtooth', 120, 55, .5, .18); noise(.3, 300, .18); }
  else if (k === 'bossDown') { noise(.5, 1200, .35); tone('triangle', 400, 1200, .4, .16); tone('sine', 200, 50, .4, .16); }
  else if (k === 'gameover') { tone('sawtooth', 400, 80, .8, .2); tone('square', 300, 60, .9, .12); } }
function fartSound(dur, pitch) { if (!snd.ready) return; const t = actx.currentTime, o = actx.createOscillator(), g = actx.createGain(), lp = actx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 800; o.type = 'sawtooth'; o.connect(lp); lp.connect(g); g.connect(sfxGain);

  for (let i = 0; i < 6; i++) o.frequency.setValueAtTime((60 + (i % 2 ? 25 : 0)) * pitch, t + i * dur / 6); // wobble = brrrt
  g.gain.setValueAtTime(.0001, t); g.gain.linearRampToValueAtTime(.22, t + .03); g.gain.exponentialRampToValueAtTime(.001, t + dur); o.start(t); o.stop(t + dur + .02); }
let lastMonsterNoise = 0;
function monsterSound(kind, voice) { if (!snd.ready) return; const t = performance.now();
  if (kind === 'idle') { if (t - lastMonsterNoise < 900) return; lastMonsterNoise = t; }
  const types = ['square', 'sawtooth', 'triangle']; const ty = types[(Math.random() * 3) | 0];
  if (kind === 'pop' && Math.random() < .3) { fartSound(.22, 1.4 * voice); return; }
  const base = (kind === 'spawn' ? 200 : kind === 'hurt' ? 260 : kind === 'pop' ? 320 : 180) * voice;
  tone(ty, base, base * (kind === 'pop' ? .4 : 1.7), .12, .07); }

// chiptune background music — bouncy I–V–vi–IV loop
const MUS = { on: true, step: 0, timer: null };
const NF = n => 440 * Math.pow(2, (n - 69) / 12); // midi->hz
const BASS = [36, 36, 43, 43, 45, 45, 41, 41]; // C G Am F (octave below)
const LEAD = [72, 76, 79, 76, 74, 77, 81, 77, 76, 79, 83, 79, 72, 76, 79, 81];

    if (s % 2 === 0) { const o = actx.createOscillator(), g = actx.createGain(); o.type = 'triangle'; o.connect(g); g.connect(musicGain); const f = NF(BASS[(s / 2) % BASS.length]); o.frequency.value = f; g.gain.setValueAtTime(.5, actx.currentTime); g.gain.exponentialRampToValueAtTime(.01, actx.currentTime + .19); o.start(); o.stop(actx.currentTime + .2); }
    { const o = actx.createOscillator(), g = actx.createGain(); o.type = 'square'; o.connect(g); g.connect(musicGain); o.frequency.value = NF(LEAD[s % LEAD.length]); g.gain.setValueAtTime(.18, actx.currentTime); g.gain.exponentialRampToValueAtTime(.01, actx.currentTime + .16); o.start(); o.stop(actx.currentTime + .17); }
    if (s % 4 === 0) noise(.04, 6000, .05, musicGain); // hi-hat
    if (s % 8 === 0) { const o = actx.createOscillator(), g = actx.createGain(); o.type = 'sine'; o.connect(g); g.connect(musicGain); o.frequency.setValueAtTime(120, actx.currentTime); o.frequency.exponentialRampToValueAtTime(40, actx.currentTime + .12); g.gain.setValueAtTime(.5, actx.currentTime); g.gain.exponentialRampToValueAtTime(.01, actx.currentTime + .14); o.start(); o.stop(actx.currentTime + .15); } // kick
    MUS.step++; }, stepMs); }
function music(on) { MUS.on = on; if (musicGain) musicGain.gain.value = on ? .22 : 0; $('btnMute').textContent = on ? '🔊' : '🔇'; }

// ---------- input ----------
const keys = {}; let yaw = 0, pitch = 0, locked = false, playing = false, mouseDown = false, shootCD = 0;
let velY = 0, onGround = true, jumpsLeft = 1;
let MOVE = 11, JUMP = 8; const EYE = 1.7, GRAVITY = 22;
const overlay = $('overlay'), hud = $('hud'), selectScreen = $('selectScreen'), pauseScreen = $('pauseScreen'), overScreen = $('overScreen');
const stick = { x: 0, y: 0 };
function setFire(v) { mouseDown = v; }
function triggerJump() { if (!playing) return; if (onGround) { velY = JUMP; onGround = false; jumpsLeft = titan.dbljump ? 1 : 0; beep('jump'); } else if (jumpsLeft > 0) { velY = JUMP * .9; jumpsLeft--; beep('jump'); } }

// titan cards
const grid = $('titanGrid');
TITANS.forEach((tn, i) => { const c = document.createElement('div'); c.className = 'titan' + (i === 0 ? ' sel' : ''); c.innerHTML = `<div class="orb" style="background:${tn.css}"></div><div class="nm">${tn.name}</div><div class="pk">${tn.perk}</div>`;
  c.addEventListener('click', e => { e.stopPropagation(); titan = tn; [...grid.children].forEach(x => x.classList.remove('sel')); c.classList.add('sel'); applyTitan(); }); grid.appendChild(c); });
$('ctlhint').innerHTML = isTouch ? 'Left = move · Right = look · FIRE · JUMP · 💨 bomb' : 'WASD move · Mouse look · Click fire · Space jump · G fart bomb · M music';

function resetGame() { for (const m of [...monsters]) scene.remove(m); monsters.length = 0;
  for (const b of [...balls]) scene.remove(b); balls.length = 0; for (const b of [...bombs]) scene.remove(b); bombs.length = 0;
  for (const p of [...pickups]) scene.remove(p); pickups.length = 0; for (const c of [...gasClouds]) scene.remove(c); gasClouds.length = 0;
  score = 0; level = 1; nextBoss = 8; bossActive = false; bossRef = null; bossEl.style.display = 'none'; power.type = null; updatePowerHud();
  hp = maxHP; lives = 3; invuln = 0; inside = false; safeEl.style.display = 'none'; playTime = 0; lastLevelTime = 0; bombCd = 0;
  camera.position.set(0, 1.7, 24); yaw = 0; pitch = 0; velY = 0;
  for (let i = 0; i < Q.base; i++) makeMonster(); updateScore(); updateHP(); updateLives(); levelEl.textContent = 'LV 1'; }

function startGame() { initAudio(); if (actx && actx.state === 'suspended') actx.resume();
  applyTitan(); resetGame(); selectScreen.classList.add('hidden'); pauseScreen.classList.add('hidden'); overScreen.classList.add('hidden');
  document.body.classList.add('playing'); music(true); musicStart();
  if (isTouch) { overlay.classList.add('hidden'); hud.classList.remove('hidden'); playing = true; goFullscreen(); } else { renderer.domElement.requestPointerLock(); } }
function resume() { pauseScreen.classList.add('hidden'); if (isTouch) { overlay.classList.add('hidden'); hud.classList.remove('hidden'); playing = true; } else { renderer.domElement.requestPointerLock(); } }
function showPause() { playing = false; overlay.classList.remove('hidden'); selectScreen.classList.add('hidden'); overScreen.classList.add('hidden'); pauseScreen.classList.remove('hidden'); hud.classList.add('hidden'); mouseDown = false; }
function goFullscreen() { try { const el = document.documentElement; (el.requestFullscreen || el.webkitRequestFullscreen || (() => {})).call(el); if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(() => {}); } catch (e) {} }

$('go').addEventListener('click', e => { e.stopPropagation(); startGame(); });
$('resume').addEventListener('click', e => { e.stopPropagation(); resume(); });
$('again').addEventListener('click', e => { e.stopPropagation(); overScreen.classList.add('hidden'); selectScreen.classList.remove('hidden'); });
$('btnMute').addEventListener('click', e => { e.stopPropagation(); music(!MUS.on); });
$('btnPause').addEventListener('click', e => { e.stopPropagation(); showPause(); });

if (!isTouch) {
  document.addEventListener('pointerlockchange', () => { locked = document.pointerLockElement === renderer.domElement;
    if (locked) { playing = true; overlay.classList.add('hidden'); hud.classList.remove('hidden'); } else if (playing && lives >= 0) showPause(); });
  document.addEventListener('mousemove', e => { if (!locked) return; yaw -= e.movementX * .0022; pitch = clamp(pitch - e.movementY * .0022, -1.52, 1.52); });
  document.addEventListener('mousedown', () => { if (locked) mouseDown = true; });
  document.addEventListener('mouseup', () => { mouseDown = false; });
  document.addEventListener('keydown', e => { keys[e.code] = true; if (e.code === 'Space') triggerJump(); if (e.code === 'KeyG') throwBomb(); if (e.code === 'KeyM') music(!MUS.on); });
  document.addEventListener('keyup', e => { keys[e.code] = false; });
}
if (isTouch) { const layer = $('touch'), stickEl = $('stick'), thumbEl = $('thumb'); let stickId = null, lookId = null, origin = { x: 0, y: 0 }, lookLast = { x: 0, y: 0 }; const R = 55;
  layer.addEventListener('pointerdown', e => { if (!playing) return; if (e.clientX < innerWidth * .5 && stickId === null) { stickId = e.pointerId; origin = { x: e.clientX, y: e.clientY }; stickEl.style.display = thumbEl.style.display = 'block'; stickEl.style.left = thumbEl.style.left = e.clientX + 'px'; stickEl.style.top = thumbEl.style.top = e.clientY + 'px'; } else if (lookId === null) { lookId = e.pointerId; lookLast = { x: e.clientX, y: e.clientY }; } });
  window.addEventListener('pointermove', e => { if (e.pointerId === stickId) { let dx = e.clientX - origin.x, dy = e.clientY - origin.y; const len = Math.hypot(dx, dy); if (len > R) { dx *= R / len; dy *= R / len; } stick.x = dx / R; stick.y = dy / R; thumbEl.style.left = (origin.x + dx) + 'px'; thumbEl.style.top = (origin.y + dy) + 'px'; } else if (e.pointerId === lookId) { yaw -= (e.clientX - lookLast.x) * .005; pitch = clamp(pitch - (e.clientY - lookLast.y) * .005, -1.52, 1.52); lookLast = { x: e.clientX, y: e.clientY }; } });
  function endP(e) { if (e.pointerId === stickId) { stickId = null; stick.x = stick.y = 0; stickEl.style.display = thumbEl.style.display = 'none'; } else if (e.pointerId === lookId) lookId = null; }
  window.addEventListener('pointerup', endP); window.addEventListener('pointercancel', endP);
  const fire = $('btnFire'); fire.addEventListener('pointerdown', e => { e.preventDefault(); setFire(true); }); fire.addEventListener('pointerup', () => setFire(false)); fire.addEventListener('pointerleave', () => setFire(false));
  $('btnJump').addEventListener('pointerdown', e => { e.preventDefault(); triggerJump(); });
  $('btnBomb').addEventListener('pointerdown', e => { e.preventDefault(); throwBomb(); }); }
addEventListener('contextmenu', e => e.preventDefault());
addEventListener('resize', () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });

// ---------- loop ----------
const clock = new THREE.Clock(); const fwd = new THREE.Vector3(), rightV = new THREE.Vector3(); let shake = 0;
function update(dt) {
  playTime += dt; camera.rotation.set(pitch, yaw, 0);
  if (invuln > 0) invuln -= dt;

  // movement
  camera.getWorldDirection(fwd); fwd.y = 0; fwd.normalize(); rightV.copy(fwd).cross(up3).normalize();
  let fA, rA; if (isTouch) { fA = -stick.y; rA = stick.x; } else { fA = (keys.KeyW ? 1 : 0) - (keys.KeyS ? 1 : 0); rA = (keys.KeyD ? 1 : 0) - (keys.KeyA ? 1 : 0); }
  const mv = new THREE.Vector3().addScaledVector(fwd, fA).addScaledVector(rightV, rA); if (mv.lengthSq() > 1) mv.normalize();
  const moving = mv.lengthSq() > 4e-4; camera.position.addScaledVector(mv, MOVE * dt);
  velY -= GRAVITY * dt; camera.position.y += velY * dt;
  const floorY = inside ? INSIDE_POS.y : EYE;
  if (camera.position.y <= floorY) { camera.position.y = floorY; velY = 0; onGround = true; jumpsLeft = titan.dbljump ? 1 : 0; }
  if (!inside) { const lim = WORLD - 3; camera.position.x = clamp(camera.position.x, -lim, lim); camera.position.z = clamp(camera.position.z, -lim, lim);
    if (moving && onGround) camera.position.y = EYE + Math.sin(clock.elapsedTime * 11) * .06; }
  else { const lim = 9; camera.position.x = clamp(camera.position.x, INSIDE_POS.x - lim, INSIDE_POS.x + lim); camera.position.z = clamp(camera.position.z, INSIDE_POS.z - lim, INSIDE_POS.z + lim); }

  // door / safe zone
  if (!inside) { const dd = (camera.position.x - doorMarker.x) ** 2 + (camera.position.z - doorMarker.z) ** 2;
    if (dd < 9) { inside = true; safeEl.style.display = 'block'; camera.position.copy(INSIDE_POS); camera.position.z += 7; banner('🛡 SAFE ZONE — TITANS TOWER'); beep('power'); } }
  else { hp = Math.min(maxHP, hp + 18 * dt); updateHP();
    const ed = (camera.position.x - exitMarker.x) ** 2 + (camera.position.z - exitMarker.z) ** 2;
    if (ed < 7) { inside = false; safeEl.style.display = 'none'; camera.position.set(doorMarker.x, EYE, doorMarker.z + 4); banner('⚔️ BACK TO THE FIGHT!'); } }

  // shooting
  shootCD -= dt; const cd = (power.type === 'rapid' || power.type === 'star') ? .08 : (power.type === 'meatball' ? .3 : titan.cd);
  if (mouseDown && shootCD <= 0 && !inside) { shoot(); shootCD = cd; }
  gun.position.z += (GUN_HOME.z - gun.position.z) * Math.min(1, dt * 12);
  if (muzzle.visible) { muzzle.scale.multiplyScalar(.8); if (muzzle.scale.x < .2) muzzle.visible = false; }
  if (power.type) { power.time -= dt; if (power.time <= 0) { power.type = null; } updatePowerHud(); }

  // bomb cooldown + button state
  if (bombCd > 0) bombCd -= dt; $('btnBomb').classList.toggle('cooling', bombCd > 0);

  // projectiles
  for (let i = balls.length - 1; i >= 0; i--) { const b = balls[i], u = b.userData; u.vel.y -= (u.meat ? 14 : 8) * dt; b.position.addScaledVector(u.vel, dt); u.life -= dt; let dead = false;
    if (u.bounce && b.position.y < u.radius) { b.position.y = u.radius; u.vel.y = Math.abs(u.vel.y) * .7; }
    for (const m of monsters) { if (u.hit.has(m)) continue; if (b.position.distanceTo(m.position) < m.userData.size + u.radius) { u.hit.add(m); damage(m, u.dmg, b.position); if (u.pierce > 0) u.pierce--; else { dead = true; break; } } }
    if (dead || u.life <= 0 || (b.position.y < -1 && !u.bounce)) { scene.remove(b); balls.splice(i, 1); } }

  // bombs
  for (let i = bombs.length - 1; i >= 0; i--) { const b = bombs[i], u = b.userData; u.vel.y -= 18 * dt; b.position.addScaledVector(u.vel, dt); b.rotation.x += dt * 6; b.rotation.y += dt * 5;
    if (b.position.y < .45) { b.position.y = .45; u.vel.y = Math.abs(u.vel.y) * .4; u.vel.x *= .6; u.vel.z *= .6; } u.fuse -= dt;
    if (u.fuse <= 0) { explodeBomb(b.position.clone()); scene.remove(b); bombs.splice(i, 1); } }

  // gas clouds (linger + damage)
  for (let i = gasClouds.length - 1; i >= 0; i--) { const c = gasClouds[i]; c.userData.life -= dt; const s = (1.1 - c.userData.life) * c.userData.r; c.scale.setScalar(Math.max(.1, s));
    c.material.opacity = c.userData.life * .5; if (c.userData.life <= 0) { scene.remove(c); gasClouds.splice(i, 1); } }

  // monsters
  const diff = difficulty(); let idlePick = null;
  for (const m of monsters) { const u = m.userData;
    if (u.grow < 1) { u.grow = Math.min(1, u.grow + dt * 3); }
    u.wander += rand(-1, 1) * dt;
    const toP = new THREE.Vector3().subVectors(camera.position, m.position); toP.y = 0; const dist = toP.length(); toP.normalize();
    const wd = new THREE.Vector3(Math.cos(u.wander), 0, Math.sin(u.wander));
    const seek = inside ? .0 : (u.isBoss ? .85 : .7); // when inside, monsters just wander
    const dir = toP.clone().multiplyScalar(seek).add(wd.multiplyScalar(1 - seek)).normalize();
    if (!inside && dist > (u.isBoss ? 3.4 : 2.2)) m.position.addScaledVector(dir, u.speed * diff.speedMul * dt);
    const lim = WORLD - 3; m.position.x = clamp(m.position.x, -lim, lim); m.position.z = clamp(m.position.z, -lim, lim);
    m.rotation.y = Math.atan2(dir.x, dir.z);
    // hop + squash/stretch (TTG bounce)
    u.bob += dt * (u.isBoss ? 4 : u.arche === 'runner' ? 12 : 7);
    const hop = Math.abs(Math.sin(u.bob)); const hght = u.floater ? 1.4 + Math.sin(u.bob) * .3 : u.size * .95 + hop * (u.isBoss ? .5 : u.arche === 'tank' ? .15 : .4);
    m.position.y = hght;
    const stretch = u.floater ? 1 : 1 + Math.cos(u.bob) * .12; if (u.body) { u.body.scale.y = u.bodyScaleY * stretch; u.body.scale.x = u.body.scale.z = 2 - stretch; }
    m.rotation.z = Math.sin(u.bob) * .08;
    if (u.iris) u.iris.material.emissiveIntensity = .45 + hop * .4;
    m.scale.setScalar(u.grow * (1 + u.hitFlash * .6)); if (u.hitFlash > 0) u.hitFlash -= dt;
    // idle noise (throttled to one monster occasionally)
    u.noiseCd -= dt; if (u.noiseCd <= 0 && !idlePick && dist < 30) { idlePick = u; u.noiseCd = rand(3, 8); }
    // touch player => damage
    if (!inside && dist < (u.isBoss ? 3.8 : u.size + 1.3)) { hurtPlayer(u.dmg, m.position); m.position.addScaledVector(toP, -u.speed * dt * 3); }
  }
  if (idlePick) monsterSound('idle', idlePick.voice);

  // keep stocked (fewer while boss out)
  const cap = bossActive ? Math.max(4, diff.target - 6) : diff.target; let guard = 0;
  while (monsters.length < cap && guard++ < 4) { const r = Math.random();
    if (level >= 2 && r < .06) makeMonster({ golden: true }); else if (level >= 3 && r < .2) makeMonster({ splitter: true }); else makeMonster(); }
  if (playTime - lastLevelTime > 26) { lastLevelTime = playTime; levelUp(); }

  // pickups
  pickupTimer -= dt; if (pickupTimer <= 0 && pickups.length < 3) { spawnPickup(); pickupTimer = rand(9, 16); }
  for (let i = pickups.length - 1; i >= 0; i--) { const g = pickups[i]; g.userData.bob += dt * 2; g.position.y = 1.3 + Math.sin(g.userData.bob) * .25; g.rotation.y += dt * 2;
    if (!inside && (g.position.x - camera.position.x) ** 2 + (g.position.z - camera.position.z) ** 2 < 5.3) { collectPickup(g.userData.kind); scene.remove(g); pickups.splice(i, 1); } }

  // particles
  for (let i = particles.length - 1; i >= 0; i--) { const p = particles[i]; p.userData.vel.y -= (p.userData.gas ? 2 : 14) * dt; p.position.addScaledVector(p.userData.vel, dt);
    if (!p.userData.gas) { p.rotation.x += p.userData.spin * dt; p.rotation.y += p.userData.spin * dt; } p.userData.life -= dt;
    p.scale.setScalar(Math.max(.01, p.userData.gas ? p.userData.life + .4 : p.userData.life)); if (p.material.opacity !== undefined && p.userData.gas) p.material.opacity = p.userData.life * .6;
    if (p.userData.life <= 0) { scene.remove(p); particles.splice(i, 1); } }

  for (const c of clouds) { c.position.x += c.userData.drift * dt; if (c.position.x > WORLD + 12) c.position.x = -WORLD - 12; }
  if (shake > 0) { shake -= dt; camera.rotation.z = Math.sin(clock.elapsedTime * 40) * shake * .05; } else camera.rotation.z = 0;
}
function animate() { requestAnimationFrame(animate); const dt = Math.min(.05, clock.getDelta()); if (playing) update(dt); renderer.render(scene, camera); }

applyTitan(); for (let i = 0; i < Q.base; i++) makeMonster(); updateScore(); updateHP(); updateLives();
$('loading').classList.add('hidden'); animate();
</script>
</body>
